<svg width="600" height="520" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, monospace">

  <!-- Background -->
  <rect width="600" height="520" fill="#1e1e2e" rx="12"/>

  <!-- App Layer -->
  <rect x="175" y="20" width="250" height="50" rx="8" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="300" y="41" text-anchor="middle" fill="white" font-size="12" font-weight="bold">App Layer</text>
  <text x="300" y="58" text-anchor="middle" fill="#cce4ff" font-size="10">app_cli  /  app_control  / ...</text>

  <!-- Arrow App -> BSP -->
  <line x1="300" y1="70" x2="300" y2="95" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BSP Box -->
  <rect x="30" y="95" width="540" height="185" rx="8" fill="#2a2a3e" stroke="#7c6fcf" stroke-width="1.5"/>
  <text x="300" y="114" text-anchor="middle" fill="#b0a0ef" font-size="11" font-weight="bold">STM32F103RB_NUCLEO_BSP</text>

  <!-- bsp_def.h -->
  <rect x="220" y="120" width="160" height="45" rx="6" fill="#3d3060" stroke="#7c6fcf" stroke-width="1"/>
  <text x="300" y="138" text-anchor="middle" fill="white" font-size="11" font-weight="bold">bsp_def.h</text>
  <text x="300" y="155" text-anchor="middle" fill="#c0b0ff" font-size="9">Status_t</text>

  <!-- bsp_system -->
  <rect x="45" y="185" width="140" height="80" rx="6" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <text x="115" y="203" text-anchor="middle" fill="white" font-size="11" font-weight="bold">bsp_system</text>
  <text x="115" y="219" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_SYS_Init</text>
  <text x="115" y="232" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_SYS_Delay</text>
  <text x="115" y="245" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_SYS_GetTick</text>

  <!-- bsp_led -->
  <rect x="220" y="185" width="160" height="80" rx="6" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <text x="300" y="203" text-anchor="middle" fill="white" font-size="11" font-weight="bold">bsp_led</text>
  <text x="300" y="219" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_LED_Init</text>
  <text x="300" y="232" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_LED_On / Off</text>
  <text x="300" y="245" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_LED_Toggle</text>

  <!-- bsp_uart -->
  <rect x="415" y="185" width="140" height="80" rx="6" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <text x="485" y="203" text-anchor="middle" fill="white" font-size="11" font-weight="bold">bsp_uart</text>
  <text x="485" y="219" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_UART_Init</text>
  <text x="485" y="232" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_UART_ReadByte</text>
  <text x="485" y="245" text-anchor="middle" fill="#a0c8ff" font-size="9">BSP_UART_WriteString</text>

  <!-- Arrows BSP modules -> bsp_def -->
  <line x1="115" y1="185" x2="240" y2="165" stroke="#7c6fcf" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="300" y1="185" x2="300" y2="165" stroke="#7c6fcf" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="485" y1="185" x2="360" y2="165" stroke="#7c6fcf" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- Arrows BSP -> HAL -->
  <line x1="115" y1="265" x2="115" y2="315" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="265" x2="300" y2="315" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="265" x2="485" y2="315" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HAL Box -->
  <rect x="30" y="315" width="540" height="80" rx="8" fill="#2a2a3e" stroke="#e08a3c" stroke-width="1.5"/>
  <text x="300" y="334" text-anchor="middle" fill="#f0a060" font-size="11" font-weight="bold">STM32CubeF1 HAL</text>

  <rect x="45" y="340" width="140" height="40" rx="5" fill="#3d2a10" stroke="#e08a3c" stroke-width="1"/>
  <text x="115" y="355" text-anchor="middle" fill="white" font-size="10" font-weight="bold">HAL_SysTick</text>
  <text x="115" y="370" text-anchor="middle" fill="#ffc080" font-size="9">HAL_Delay / GetTick</text>

  <rect x="220" y="340" width="160" height="40" rx="5" fill="#3d2a10" stroke="#e08a3c" stroke-width="1"/>
  <text x="300" y="355" text-anchor="middle" fill="white" font-size="10" font-weight="bold">HAL_GPIO</text>
  <text x="300" y="370" text-anchor="middle" fill="#ffc080" font-size="9">HAL_GPIO_WritePin</text>

  <rect x="415" y="340" width="140" height="40" rx="5" fill="#3d2a10" stroke="#e08a3c" stroke-width="1"/>
  <text x="485" y="355" text-anchor="middle" fill="white" font-size="10" font-weight="bold">HAL_UART / DMA</text>
  <text x="485" y="370" text-anchor="middle" fill="#ffc080" font-size="9">HAL_UART_Receive_DMA</text>

  <!-- Arrows HAL -> HW -->
  <line x1="115" y1="395" x2="115" y2="435" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="395" x2="300" y2="435" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="395" x2="485" y2="435" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hardware Box -->
  <rect x="30" y="435" width="540" height="65" rx="8" fill="#2a2a3e" stroke="#50c878" stroke-width="1.5"/>
  <text x="300" y="454" text-anchor="middle" fill="#70e898" font-size="11" font-weight="bold">STM32F103RB-NUCLEO Hardware</text>

  <rect x="45" y="460" width="140" height="28" rx="5" fill="#0f3020" stroke="#50c878" stroke-width="1"/>
  <text x="115" y="478" text-anchor="middle" fill="#90ffb0" font-size="10">SysTick</text>

  <rect x="220" y="460" width="160" height="28" rx="5" fill="#0f3020" stroke="#50c878" stroke-width="1"/>
  <text x="300" y="478" text-anchor="middle" fill="#90ffb0" font-size="10">LD2 (PA5)</text>

  <rect x="415" y="460" width="140" height="28" rx="5" fill="#0f3020" stroke="#50c878" stroke-width="1"/>
  <text x="485" y="478" text-anchor="middle" fill="#90ffb0" font-size="10">USART2 (PA2/PA3)</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c6fcf"/>
    </marker>
  </defs>

</svg>
